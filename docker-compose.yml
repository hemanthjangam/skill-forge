version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: skillforge-postgres
    environment:
      POSTGRES_DB: skillforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - skillforge_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skillforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  skillforge_pg_data:
